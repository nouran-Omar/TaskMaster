<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TaskMaster Pro</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <!-- PDF Export Libraries -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <!-- SweetAlert2 -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css">
    <!-- Animate.css -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <!-- Flatpickr -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body>
    <div class="app-container">

      <!-- ── Ambient BG Orbs ── -->
      <div class="bg-orb orb-1"></div>
      <div class="bg-orb orb-2"></div>
      <div class="bg-orb orb-3"></div>

      <!-- ── Header ── -->
      <header class="app-header">
        <!-- تم إزالة زر المنيو الجانبي تماماً بناءً على طلبك وصورة image_8ca6e3.png -->
        <div class="header-center">
          <h1><i class="fas fa-bolt"></i> TaskMaster Pro</h1>
          <p>Organize your work in style</p>
        </div>

        <button class="theme-toggle-btn" id="theme-toggle-btn" aria-label="Toggle theme">
          <i class="fas fa-moon"></i>
        </button>
      </header>

      <!-- ── Main Layout ── -->
      <div class="main-content">

        <!-- Floating Mobile Nav (bottom-right) -->
        <div class="mobile-fab-nav" id="mobile-fab-nav">
          <button class="fab-main" id="fab-main-btn" aria-label="Navigation">
            <i class="fas fa-star"></i>
          </button>
          <div class="fab-items" id="fab-items">
            <button class="fab-item" data-filter="inbox" title="Inbox"><i class="fas fa-inbox"></i></button>
            <button class="fab-item" data-filter="important" title="Important"><i class="fas fa-star"></i></button>
            <button class="fab-item" data-filter="planned" title="Planned"><i class="fas fa-calendar"></i></button>
            <button class="fab-item" data-filter="completed" title="Completed"><i class="fas fa-check"></i></button>
            <button class="fab-item" data-filter="categories" title="Categories"><i class="fas fa-tag"></i></button>
          </div>
        </div>

        <!-- Sidebar (tablet: persistent icon rail; mobile: hidden) -->
        <aside class="sidebar" id="sidebar">

          <!-- User profile -->
          <div class="user-profile">
            <div class="avatar-container">
              <img src="https://i.ibb.co/7z3aG0r/profile-placeholder.png"
                   alt="Profile Picture" id="profile-img" class="avatar" />
              <label for="profile-upload" class="edit-avatar-btn" title="Change photo">
                <i class="fas fa-camera"></i>
              </label>
              <input type="file" id="profile-upload" accept="image/*" style="display:none" />
            </div>
            <div class="user-info">
              <span class="username" id="username-display">Nouran Omar</span>
              <button id="edit-username-btn" class="task-action-btn" title="Edit name">
                <i class="fas fa-pencil-alt"></i>
              </button>
            </div>
          </div>

          <!-- Navigation -->
          <nav class="main-nav">
            <ul>
              <li class="active">
                <a href="#" data-filter="inbox">
                  <i class="fas fa-inbox"></i>
                  <span>Inbox</span>
                </a>
              </li>
              <li>
                <a href="#" data-filter="important">
                  <i class="fas fa-star"></i>
                  <span>Important</span>
                </a>
              </li>
              <li>
                <a href="#" data-filter="planned">
                  <i class="fas fa-calendar"></i>
                  <span>Planned</span>
                </a>
              </li>
              <li>
                <a href="#" data-filter="completed">
                  <i class="fas fa-check"></i>
                  <span>Completed</span>
                </a>
              </li>
              <li>
                <a href="#" data-filter="categories">
                  <i class="fas fa-tag"></i>
                  <span>Categories</span>
                </a>
              </li>
            </ul>
          </nav>

          <!-- Progress -->
          <div class="progress-container">
            <div class="progress-header">
              <span>Today's Progress</span>
              <span>65%</span>
            </div>
            <div class="progress-bar">
              <div class="progress-fill" style="width:65%"></div>
            </div>
          </div>

        </aside>

        <!-- Task Manager -->
        <main class="task-manager">

          <div class="task-header">
            <h2>My Tasks</h2>
            <div class="task-actions">
              <button class="btn btn-primary" id="add-task-btn">
                <i class="fas fa-plus"></i> Add Task
              </button>
              <button class="btn btn-secondary" id="download-pdf-btn">
                <i class="fas fa-file-pdf"></i> PDF
              </button>
              <div class="view-options">
                <button class="view-option active" title="List view">
                  <i class="fas fa-list"></i>
                </button>
                <button class="view-option" title="Grid view">
                  <i class="fas fa-th-large"></i>
                </button>
              </div>
            </div>
          </div>

          <!-- Filters - glassmorphism style -->
          <div class="task-filters">
            <div class="filter-group">
              <label for="filter-status"><i class="fas fa-circle-dot"></i> Status</label>
              <select id="filter-status">
                <option value="all">All Status</option>
                <option value="pending">Pending</option>
                <option value="in-progress">In Progress</option>
                <option value="completed">Completed</option>
              </select>
            </div>
            <div class="filter-group">
              <label for="filter-priority"><i class="fas fa-flag"></i> Priority</label>
              <select id="filter-priority">
                <option value="all">All Priority</option>
                <option value="high">High</option>
                <option value="medium">Medium</option>
                <option value="low">Low</option>
              </select>
            </div>
            <div class="filter-group">
              <label for="filter-date"><i class="fas fa-calendar-days"></i> Due Date</label>
              <select id="filter-date">
                <option value="all">All Dates</option>
                <option value="today">Today</option>
                <option value="week">This Week</option>
                <option value="month">This Month</option>
              </select>
            </div>
          </div>

          <div class="task-list" id="task-list">
            <!-- Tasks rendered by JS -->
          </div>

        </main>
      </div>
    </div>

    <!-- ── Task Modal ── -->
    <div class="modal" id="task-modal">
      <div class="modal-content">
        <button class="close-modal" aria-label="Close"><i class="fas fa-times"></i></button>
        <div class="modal-header-bar">
          <div class="modal-icon"><i class="fas fa-sparkles"></i></div>
          <h3>Add New Task</h3>
        </div>
        <form id="task-form">
          <div class="form-group">
            <label for="task-title">Task Title</label>
            <input type="text" id="task-title" placeholder="What needs to be done?" required />
          </div>
          <div class="form-group">
            <label for="task-description">Description</label>
            <textarea id="task-description" placeholder="Add some details..."></textarea>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label for="task-due-date">Due Date</label>
              <input type="text" id="task-due-date" placeholder="Pick a date" class="flatpickr-input" readonly />
            </div>
            <div class="form-group">
              <label for="task-priority">Priority</label>
              <select id="task-priority">
                <option value="low">🟢 Low</option>
                <option value="medium" selected>🟡 Medium</option>
                <option value="high">🔴 High</option>
              </select>
            </div>
          </div>
          <div class="form-group">
            <label for="task-category">Category</label>
            <select id="task-category">
              <option value="work">💼 Work</option>
              <option value="personal">🏡 Personal</option>
              <option value="shopping">🛒 Shopping</option>
              <option value="other">✨ Other</option>
            </select>
          </div>
          <div class="form-actions">
            <button type="button" class="btn btn-secondary" id="cancel-task">Cancel</button>
            <button type="submit" class="btn btn-primary">Save Task</button>
          </div>
        </form>
      </div>
    </div>

    <!-- Mobile overlay -->
    <div class="overlay" id="overlay"></div>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script src="js/script.js"></script>
  </body>
</html>
